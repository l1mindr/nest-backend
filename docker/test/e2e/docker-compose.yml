services:
  app:
    build:
      context: ../../..
      target: test

    environment:
      NODE_ENV: test

      DATA_SOURCE_HOST: postgres
      DATA_SOURCE_PORT: 5432
      DATA_SOURCE_USERNAME: postgres
      DATA_SOURCE_PASSWORD: postgres
      DATA_SOURCE_DATABASE: test_e2e_db

      REDIS_HOST: redis
      REDIS_PORT: 6379
      # REDIS_PASSWORD: ''
      # REDIS_DB: 0

      ACCESS_TOKEN_SECRET: accessjwtsecret
      Refresh_TOKEN_SECRET: refreshjwtsecret

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

    command: sh docker-entrypoint-test.sh

  postgres:
    image: postgres:17-alpine

    environment:
      POSTGRES_DB: test_e2e_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - '5433:5432'

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d test_e2e_db']
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine

    ports:
      - '6380:6379'

    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
