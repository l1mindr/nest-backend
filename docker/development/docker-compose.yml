services:
  # ---------------------------------------------------------------------------
  # migration — runs schema migrations, then exits.
  # Ensures the database is up-to-date before the app starts.
  # ---------------------------------------------------------------------------
  migration:
    build:
      context: ../../
      target: migration

    container_name: nest-migration

    env_file:
      - ../../.env.development

    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # app — the NestJS application (dev mode with live-reload)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: ../../
      dockerfile: Dockerfile
      target: build

    container_name: nest-app

    env_file:
      - ../../.env.development

    ports:
      - '3000:3000'

    volumes:
      - ../../src:/app/src
      - ../../package.json:/app/package.json
      - ../../tsconfig.json:/app/tsconfig.json

    depends_on:
      migration:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

    command: pnpm run start:dev

  # ---------------------------------------------------------------------------
  # postgres
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine

    container_name: postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: nest_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - '5432:5432'

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 20

  # ---------------------------------------------------------------------------
  # redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine

    container_name: redis

    restart: unless-stopped

    ports:
      - '6379:6379'

    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
