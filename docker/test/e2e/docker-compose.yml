services:
  migration:
    build:
      context: ../../..
      target: migration

    environment:
      NODE_ENV: test
      DATA_SOURCE_HOST: postgres
      DATA_SOURCE_PORT: 5432
      DATA_SOURCE_USERNAME: postgres
      DATA_SOURCE_PASSWORD: postgres
      DATA_SOURCE_DATABASE: test_e2e_db

    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: ../../..
      target: production

    environment:
      NODE_ENV: test

      DATA_SOURCE_HOST: postgres
      DATA_SOURCE_PORT: 5432
      DATA_SOURCE_USERNAME: postgres
      DATA_SOURCE_PASSWORD: postgres
      DATA_SOURCE_DATABASE: test_e2e_db

      REDIS_HOST: redis
      REDIS_PORT: 6379

      ACCESS_TOKEN_SECRET: accessjwtsecret
      REFRESH_TOKEN_SECRET: refreshjwtsecret
      CSRF_TOKEN_SECRET: csrftokensecret

    depends_on:
      migration:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

    command: pnpm run test:e2e

  postgres:
    image: postgres:17-alpine

    environment:
      POSTGRES_DB: test_e2e_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - '5433:5432'

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d test_e2e_db']
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine

    ports:
      - '6380:6379'

    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
