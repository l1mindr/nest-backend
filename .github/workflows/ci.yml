name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  test:
    name: Lint • Unit • E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type Check
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Unit Tests
        run: pnpm run test:unit

      - name: Production Image
        run: docker build --tag nest-backend:ci .

      - name: Production Image Contract
        run: |
          test "$(docker image inspect --format '{{json .Config.Cmd}}' nest-backend:ci)" = '["node","dist/main.js"]'
          docker run --rm --entrypoint node nest-backend:ci -e "
            const fs = require('node:fs');
            const migrationDirectory = 'dist/infrastructure/databases/postgres/migrations';
            if (process.env.NODE_ENV !== 'production') throw new Error('NODE_ENV must be production');
            if (process.getuid?.() === 0) throw new Error('Production image must not run as root');
            fs.accessSync('dist/main.js');
            fs.accessSync('dist/infrastructure/databases/postgres/data-source.js');
            fs.accessSync('node_modules/.bin/typeorm', fs.constants.X_OK);
            if (!fs.readdirSync(migrationDirectory).some((file) => file.endsWith('.js'))) {
              throw new Error('Production image does not contain compiled migrations');
            }
            require.resolve('typeorm');
          "

      - name: E2E Tests (Docker)
        run: |
          docker compose \
            -f docker/test/e2e/docker-compose.yml \
            build migration app
          docker compose \
            -f docker/test/e2e/docker-compose.yml \
            up -d --wait postgres redis
          docker compose \
            -f docker/test/e2e/docker-compose.yml \
            run --rm --no-deps migration
          docker compose \
            -f docker/test/e2e/docker-compose.yml \
            run --rm --no-deps app

      - name: Cleanup
        if: always()
        run: |
          docker compose \
            -f docker/test/e2e/docker-compose.yml \
            down -v
