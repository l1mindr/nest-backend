services:
  migration:
    build:
      context: ../../..

    environment:
      NODE_ENV: production

      DATA_SOURCE_HOST: postgres
      DATA_SOURCE_PORT: 5432
      DATA_SOURCE_USERNAME: postgres
      DATA_SOURCE_PASSWORD: postgres
      DATA_SOURCE_DATABASE: test_e2e_db

    depends_on:
      postgres:
        condition: service_healthy

    command: npm run migration:run
    init: true

  app:
    build:
      context: ../../..
      target: test

    environment:
      NODE_ENV: test

      DATA_SOURCE_HOST: postgres
      DATA_SOURCE_PORT: 5432
      DATA_SOURCE_USERNAME: postgres
      DATA_SOURCE_PASSWORD: postgres
      DATA_SOURCE_DATABASE: test_e2e_db

      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAX_ACTIVE_SESSIONS: 10
      # REDIS_PASSWORD: ''
      # REDIS_DB: 0

      ACCESS_TOKEN_SECRET: 3SGh4K6nRjy3rUiEZcwMaG4xZFyObMdJ
      REFRESH_TOKEN_SECRET: juQXiRL05Isuon4mhjdwwwd4lUCaEc4Z
      CSRF_TOKEN_SECRET: Py2RzgyepufR9xQD

    depends_on:
      migration:
        condition: service_completed_successfully

      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

    command: pnpm run test:e2e:docker

  postgres:
    image: postgres:17-alpine

    environment:
      POSTGRES_DB: test_e2e_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - '5433:5432'

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d test_e2e_db']
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine

    ports:
      - '6380:6379'

    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
